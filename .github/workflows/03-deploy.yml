name: Deploy on Develop

on:
  push:
    branches: [develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Replace the step below with your actual deployment target.
      # Examples:
      #   Vercel:  npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
      #   Netlify: npx netlify-cli deploy --prod --dir=dist --auth ${{ secrets.NETLIFY_TOKEN }}
      #   AWS S3:  aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete
      - name: Deploy
        run: |
          echo "Build succeeded. Add your deployment command here."
          echo "Dist output:"
          ls dist/
