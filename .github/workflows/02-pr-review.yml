name: PR Review & Auto-Fix

on:
  pull_request:
    types: [opened, synchronize]
    branches: [develop]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash,Edit,Write,Read,Glob,Grep"
          allowed_bots: "*"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} ("${{ github.event.pull_request.title }}").

            First, check whether this is a first-time review or a follow-up run triggered by
            an earlier automated fix commit. Run:
              gh pr view ${{ github.event.pull_request.number }} --comments --json comments \
                -q '.comments[] | select(.author.login == "claude") | .body' | head -1

            If output is non-empty, a review comment already exists — this is a FOLLOW-UP RUN.
            If output is empty, this is the FIRST RUN.

            ---

            ## If FIRST RUN:

            1. Read CLAUDE.md, then inspect all changed files for violations
               (conventions, MUI v9 rules, TypeScript types, component rules, routing).

            2. Auto-fix what you can — run `npm run lint -- --fix`, fix remaining violations
               manually, fix TypeScript errors, then run `npm run build && npm test -- --run --passWithNoTests`.
               If you made changes, commit them:
                 git add -A && git commit -m "fix(review): address automated review findings" && git push origin HEAD

            3. Post a full review report:
                 gh pr comment ${{ github.event.pull_request.number }} --body "<report>"
               Include: summary, issues fixed automatically, observations for the developer,
               test coverage assessment, and a final verdict (READY FOR HUMAN REVIEW / CHANGES REQUIRED).

            ---

            ## If FOLLOW-UP RUN (review comment already exists):

            1. Run quality gates only — do not re-review the full code:
                 npm run lint -- --fix && npm run build && npm test -- --run --passWithNoTests

            2. Post a short follow-up comment only:
                 gh pr comment ${{ github.event.pull_request.number }} --body "<short comment>"

               The short comment must follow this format:
               ---
               **✅ Follow-up check passed**

               All quality gates clean after automated fixes:
               - `npm run lint` — ✅
               - `npm run build` — ✅
               - `npm test` — ✅

               No further issues found. See the review above for full details.
               ---

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
