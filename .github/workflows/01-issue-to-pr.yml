name: Issue → Implement → PR

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A new GitHub issue has been opened:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body: ${{ github.event.issue.body }}

            Complete these steps in order:

            1. Expand the issue into a full user story (description, Given/When/Then acceptance
               criteria, edge cases, effort estimate S/M/L/XL) and update the issue body:
                 gh issue edit ${{ github.event.issue.number }} --body "<expanded story>"

            2. Configure git, create branch `feature/GH-${{ github.event.issue.number }}-<slug>`,
               and implement the feature — follow CLAUDE.md for all conventions.

            3. Write unit tests for every new or changed component.

            4. Run the quality gate and fix any failures before continuing:
                 npm run lint -- --fix && npm run build && npm test -- --run --passWithNoTests

            5. Commit all changes and open a PR targeting `develop`:
                 gh pr create --title "[GH-${{ github.event.issue.number }}] ${{ github.event.issue.title }}" \
                   --body "..." --base develop

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
