name: Issue → Implement → PR

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            A new GitHub issue has been opened:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body: ${{ github.event.issue.body }}

            ---

            ## Step 1 — Assess whether there is enough information to implement

            Before writing any code, decide if the issue provides enough detail to implement
            correctly. Ask yourself:
            - Is it clear what UI or behaviour is expected?
            - Is the scope well-defined (not open-ended like "improve the app")?
            - Are there enough specifics to make implementation decisions without guessing?

            **If NO — post a clarifying question and stop:**
              gh issue comment ${{ github.event.issue.number }} --body "Before I start I need a few details:\n\n<specific questions, one per line>\n\nReply here and I'll pick it up."
            Do not create a branch, do not write any code. Stop here.

            **If YES — proceed with steps 2–6 below.**

            ---

            ## Step 2 — Expand the story

            Update the issue body, preserving the original description at the top:
              gh issue edit ${{ github.event.issue.number }} --body "${{ github.event.issue.body }}

            ---

            ## Story Expansion

            <expanded story: description, Given/When/Then acceptance criteria, edge cases, effort estimate S/M/L/XL>"

            ---

            ## Step 3 — Implement

            Configure git, create branch `feature/GH-${{ github.event.issue.number }}-<slug>`,
            and implement the feature — follow CLAUDE.md for all conventions.
            If the issue body contains image URLs, download each with curl into src/assets/
            with a meaningful filename and import locally — never use remote URLs in code.

            ---

            ## Step 4 — Write unit tests

            Write unit tests for every new or changed component.

            ---

            ## Step 5 — Quality gate

            Fix any failures before continuing:
              npm run lint -- --fix && npm run build && npm test -- --run --passWithNoTests

            ---

            ## Step 6 — Self-update docs

            Before committing, update documentation if warranted:

            - Update README.md if a new route, page, or user-facing feature was added.
              Edit only the relevant section — do not rewrite unrelated content.
            - Update CLAUDE.md if a new pattern, convention, or edge case was encountered
              that future agents should know. Add to the relevant section; never duplicate
              existing rules or add conflicting ones.

            ---

            ## Step 7 — Raise PR

            Commit all changes (including any doc updates) and open a PR targeting `develop`:
              gh pr create --title "[GH-${{ github.event.issue.number }}] ${{ github.event.issue.title }}" \
                --body "## Summary
            <what was added and why>

            ## UI Changes
            <description of visual changes>

            ## Test Plan
            - [ ] <test item>

            Closes #${{ github.event.issue.number }}" \
                --base develop

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
