name: PR Comment — Respond & Act

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  handle-comment:
    # Only run on PR comments from allowed actors, never bots
    if: |
      github.event.comment.user.type != 'Bot' &&
      contains(vars.ALLOWED_ACTORS, github.event.comment.user.login) &&
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
        github.event_name == 'pull_request_review_comment'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Resolve PR number and head branch
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            PR_NUMBER=${{ github.event.issue.number }}
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi
          HEAD_REF=$(gh pr view $PR_NUMBER --json headRefName -q '.headRefName')
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            A comment was posted on PR #${{ steps.pr.outputs.number }}.

            Comment by: ${{ github.event.comment.user.login }}
            Comment: "${{ github.event.comment.body }}"

            ---

            ## Step 1 — Get full PR context

            Run the following to read the full comment history:
              gh pr view ${{ steps.pr.outputs.number }} --comments

            Check if the most recent bot comment (author: claude) was asking the user a
            clarification question. If yes, the current comment is a CLARIFICATION RESPONSE.

            Also check current branch state to understand what has already been done:
              git log --oneline -10
              git diff HEAD~1 --stat

            ---

            ## Step 2 — Classify this comment as one of:

            **A — CHANGE REQUEST**: clearly asks for a code change.
            Examples: "fix X", "rename this to Y", "the colour should be Z", "handle null here".

            **B — CLARIFICATION RESPONSE**: the last bot comment asked a question, and this
            comment is the user's answer providing the missing context.

            **C — NEEDS MORE INFO**: the request is too vague to implement safely without
            risking the wrong outcome.
            Examples: "make it look better", "improve performance", with no specifics.

            **D — NOT ACTIONABLE**: praise, general discussion, a question to the developer,
            or feedback with no implied code change.

            ---

            ## Step 3 — Act based on type

            ### If A or B — implement the change:
            - Read CLAUDE.md for all conventions
            - Review existing work on this branch (git log, git diff) — build on top of it,
              do NOT revert or restart from scratch
            - Implement the requested change following all CLAUDE.md conventions
            - Run the quality gate:
                npm run lint -- --fix && npm run build && npm test -- --run --passWithNoTests
            - Commit and push:
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git add -A && git commit -m "fix: <one line describing what changed>" && git push origin HEAD
            - Post a brief reply:
                gh pr comment ${{ steps.pr.outputs.number }} --body "✅ Done — <one sentence describing what was changed and where>"

            ### If C — ask for clarification:
            - Do NOT make any code changes
            - Post a specific question:
                gh pr comment ${{ steps.pr.outputs.number }} --body "To implement this I need a bit more detail:\n\n<specific question(s)>\n\nReply here and I'll pick it up."

            ### If D — acknowledge briefly or skip:
            - If it's purely conversational, do nothing
            - If it warrants a one-line reply (e.g. a question directed at you), post one

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
